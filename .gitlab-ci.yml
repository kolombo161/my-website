pages:
  stage: deploy
  script:
    - mkdir public
    - Get-ChildItem -Path . -Exclude public | Copy-Item -Destination public -Recurse -Force
    - Remove-Item -Recurse -Force public\.git -ErrorAction SilentlyContinue
    - Remove-Item -Force public\.gitlab-ci.yml -ErrorAction SilentlyContinue
  artifacts:
    paths:
      - public
  only:
    - main